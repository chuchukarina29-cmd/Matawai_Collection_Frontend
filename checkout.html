<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Checkout | Matawai Collection</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav
      class="navbar navbar-expand-lg navbar-light bg-cream sticky-top shadow-sm"
    >
      <div class="container">
        <a class="navbar-brand brand-logo" href="index.html">
          <span class="brand-mark">
            <img src="img/logo-matawai.png" alt="Logo Matawai Collection" />
          </span>
          <span>Matawai Collection</span>
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#menuNavbar"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menuNavbar">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Beranda</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="produk.html">Produk</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="tentang.html">Tentang & Lokasi</a>
            </li>
            <li class="nav-item ms-lg-2">
              <a class="btn btn-gold position-relative" href="keranjang.html">
                <i class="bi bi-bag-check me-1"></i> Keranjang
                <span class="cart-count badge rounded-pill text-bg-danger"
                  >0</span
                >
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <header class="page-header">
      <div class="container">
        <span class="eyebrow">Checkout simulasi</span>
        <h1>Lengkapi data pemesanan</h1>
      </div>
    </header>

    <main class="section-padding pt-4">
      <div class="container">
        <div class="row g-4">
          <div class="col-lg-7">
            <form id="checkoutForm" class="checkout-panel shadow-soft">
              <h2 class="h4 mb-3">Data Pembeli</h2>

              <div class="mb-3">
                <label for="buyerName" class="form-label">Nama lengkap</label>
                <input
                  type="text"
                  class="form-control"
                  id="buyerName"
                  placeholder="Masukkan nama lengkap"
                  required
                />
              </div>

              <div class="mb-3">
                <label for="buyerPhone" class="form-label"
                  >Nomor WhatsApp</label
                >
                <input
                  type="tel"
                  class="form-control"
                  id="buyerPhone"
                  placeholder="Contoh: 081234567890"
                  required
                />
              </div>

              <div class="mb-3">
                <label for="buyerAddress" class="form-label"
                  >Alamat atau catatan pengambilan</label
                >
                <textarea
                  class="form-control"
                  id="buyerAddress"
                  rows="4"
                  placeholder="Contoh: Ambil langsung di Pasar Matawai pukul 10.00"
                ></textarea>
              </div>

              <div class="payment-list">
                <label class="payment-option">
                  <input
                    type="radio"
                    name="paymentMethod"
                    value="Bayar di tempat"
                    checked
                  />
                  <div>
                    <i class="bi bi-cash-coin"></i>
                    <strong>Bayar di tempat</strong>
                    <span
                      >Pembayaran dilakukan saat mendapatkan barang dirumah.</span
                    >
                  </div>
                </label>

                <label class="payment-option">
                  <input
                    type="radio"
                    name="paymentMethod"
                    value="Transfer bank"
                  />
                  <div>
                    <i class="bi bi-bank"></i>
                    <strong>Transfer bank</strong>
                    <span>Pilih bank tujuan transfer.</span>
                  </div>
                </label>

                <label class="payment-option">
                  <input type="radio" name="paymentMethod" value="QRIS" />
                  <div>
                    <i class="bi bi-qr-code"></i>
                    <strong>QRIS</strong>
                    <span
                      >Scan QRIS dan selesaikan pembayaran dalam 5 menit.</span
                    >
                  </div>
                </label>
              </div>

              <div id="paymentInfo" class="mt-3"></div>
              <button type="submit" class="btn btn-main btn-lg w-100 mt-4">
                <i class="bi bi-whatsapp me-2"></i>Kirim Pesanan ke WhatsApp
              </button>
            </form>
          </div>

          <div class="col-lg-5">
            <div class="summary-card shadow-soft sticky-summary">
              <h3>Ringkasan Pesanan</h3>
              <div id="checkoutItems"></div>

              <hr />

              <div class="summary-total">
                <span>Total</span>
                <strong id="checkoutTotal">Rp0</strong>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer-section">
      <div class="container">
        <p class="mb-0">Matawai Collection</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/checkout.js"></script>
  </body>
</html>
